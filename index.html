<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale:1.0">
    <title>Pokemon Memory Cards!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://jsdelivr.net" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game">
        <div class="topbar">
            <div class="lvlbox pf">LVL <span id="levelText">1</span></div>
            <div class="expbarwrap">
                <div class="expbarfill" id="expBarFill"></div>
            </div>
            <div class="lvlbox pf">EXP</div>
        </div>

        <div class="statline">
            <span>Board <span id="boardText">1</span></span>
            <span>Moves: <span id="movesText">0</span></span>
        </div>

        <div class="board" id="board"></div>

        <div class="msg" id="msg">Find the matching pairs!</div>

        <div class="btnrow">
            <button id="newBoardBtn">New Board</button>
            <button id="restartBtn">Restart</button>
        </div>
    </div>

    <script src="https://jsdelivr.net" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
