<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Memory Cards!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="startScreen" class="start-screen">
        <div class="start-box">
            <h1 class="pf startTitle">Pokemon Memory Cards!</h1>
            <p class="startSub">pick a difficulty to begin</p>
            <div class="diffRow">
                <button id="easyBtn" class="diffBtn">Easy</button>
                <button id="mediumBtn" class="diffBtn">Medium</button>
                <button id="hardBtn" class="diffBtn">Hard</button>
            </div>
        </div>
    </div>

    <div class="game" id="gameScreen">
        <div class="topbar">
            <div class="lvlbox pf">LVL <span id="levelText">1</span></div>
            <div class="expbarwrap">
                <div class="expbarfill" id="expBarFill"></div>
            </div>
            <div class="lvlbox pf">EXP</div>
        </div>

        <div class="statline">
            <span>Board <span id="boardText">1</span></span>
            <span>Time: <span id="timerText">0:00</span></span>
            <span>Moves: <span id="movesText">0</span></span>
        </div>

        <div class="bestTimeLine">Best for this size: <span id="bestTimeText">--:--</span></div>

        <div class="board" id="board"></div>

        <div class="msg" id="msg">Find the matching pairs!</div>

        <div class="btnrow">
            <button id="newBoardBtn">New Board</button>
            <button id="restartBtn">Restart</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
